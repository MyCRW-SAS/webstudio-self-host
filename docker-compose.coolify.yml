services:
  # ── PostgREST ───────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PGRST_DB_URI=${PGRST_DB_URI}
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${SERVICE_BASE64_64_PGRST}
      - PGRST_DB_SCHEMAS=public

  # ── Schema migrations ───────────────────────────────────────────────────────
  migrate:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-community/builder:latest}
    restart: "no"
    depends_on: []
    entrypoint:
      - /prisma/node_modules/.bin/prisma
      - migrate
      - deploy
      - --schema=/app/prisma/schema.prisma
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}

  # ── Webstudio builder ───────────────────────────────────────────────────────
  app:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-community/builder:latest}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - SERVICE_FQDN_APP_3000
      - APP_FQDN=builder.mycrw.com
      - NODE_ENV=production
      - PORT=3000
      - POSTGREST_URL=http://postgrest:3000
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - AUTH_SECRET=${SERVICE_PASSWORD_AUTH}
      - DEV_LOGIN=true
      - GH_CLIENT_ID=${GH_CLIENT_ID}
      - GH_CLIENT_SECRET=${GH_CLIENT_SECRET}
      - PGRST_JWT_SECRET=${SERVICE_BASE64_64_PGRST}
      - PUBLISHER_HOST=wstd.mycrw.com
      - FEATURES=*
      - USER_PLAN=pro
      - MAX_ASSETS_PER_PROJECT=50
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - TRPC_SERVER_API_TOKEN=${SERVICE_BASE64_64_TRPC}
      - SELF_HOSTED_PUBLISHER_URL=http://publisher:4000
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - uploads:/app/public/s/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws-canvas.rule=HostRegexp(`^.+[.]builder[.]mycrw[.]com`)"
      - "traefik.http.routers.ws-canvas.entrypoints=https"
      - "traefik.http.routers.ws-canvas.tls=true"
      - "traefik.http.routers.ws-canvas.tls.certresolver=cloudflare"
      - "traefik.http.routers.ws-canvas.tls.domains[0].main=*.builder.mycrw.com"
      - "traefik.http.routers.ws-canvas.tls.domains[0].sans=builder.mycrw.com"
      - "traefik.http.routers.ws-canvas.service=ws-canvas-svc"
      - "traefik.http.routers.ws-canvas.middlewares=gzip"
      - "traefik.http.services.ws-canvas-svc.loadbalancer.server.port=3000"

  # ── Self-hosted publisher ────────────────────────────────────────────────────
  publisher:
    image: ${PUBLISHER_IMAGE:-ghcr.io/webstudio-community/webstudio-publisher:latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      - TRPC_SERVER_API_TOKEN=${SERVICE_BASE64_64_TRPC}
      - PUBLISHER_HOST=wstd.mycrw.com
      - BUILDER_INTERNAL_URL=http://app:3000
    volumes:
      - published-sites:/var/publish
      - publisher-work:/var/work

  # ── Nginx para previews ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - published-sites:/var/publish:ro
    entrypoint:
      - /bin/sh
      - -c
      - "echo '' | base64 -d > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws-publisher.rule=HostRegexp(`^.+[.]wstd[.]mycrw[.]com`)"
      - "traefik.http.routers.ws-publisher.entrypoints=https"
      - "traefik.http.routers.ws-publisher.tls=true"
      - "traefik.http.routers.ws-publisher.tls.certresolver=cloudflare"
      - "traefik.http.routers.ws-publisher.tls.domains[0].main=*.wstd.mycrw.com"
      - "traefik.http.routers.ws-publisher.tls.domains[0].sans=wstd.mycrw.com"
      - "traefik.http.routers.ws-publisher.service=ws-publisher-svc"
      - "traefik.http.routers.ws-publisher.middlewares=gzip"
      - "traefik.http.services.ws-publisher-svc.loadbalancer.server.port=80"

volumes:
  uploads:
  published-sites:
  publisher-work:
